</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
<div class="container">

<a class="navbar-brand fw-bold" href="#">DisasterEye</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/alerts">Alerts</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">

</li>

<li class="nav-item">
<a class="nav-link" href="/emergency">Emergency</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/report">Report</a>
</li>



{% if session.get("user_id") %}

<li class="nav-item">
<span class="nav-link text-dark">
<strong>{{session["user_name"] }}</strong>
</span>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="/user_logout">Logout</a>
</li>

{% else %}

<li class="nav-item">
<a class="nav-link" href="/login">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/register">Register</a>
</li>

{% endif %}
</ul>

</div>
</nav>


<!-- Hero Section -->

<section class="hero">

<div class="hero-content">
<div class="btn-group">
  
<a href="/alerts" class="btn1">Latest Updates</a>
<a href="/map" class="btn2">Disaster Map</a>
</div>
</div>
</section>
