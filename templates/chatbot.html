<!DOCTYPE html>
<html>
<head>
<title>AI Disaster Assistant</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
#chatbox {
    height: 400px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background: white;
}
</style>

</head>

<body class="bg-light">

<div class="container mt-4">
<h3 class="text-danger">🤖 AI Disaster Assistant</h3>

<div id="chatbox"></div>

<div class="input-group mt-3">
<input type="text" id="msg" class="form-control" placeholder="Ask something...">
<button type="button" class="btn btn-danger" onclick="sendMsg()">Send</button>
</div>
</div>

<!-- ✅ SCRIPT MUST BE INSIDE THIS -->
<script>
function sendMsg(){

    let msg = document.getElementById("msg").value.trim();

    if(msg === "") return;

    // Show user message
    document.getElementById("chatbox").innerHTML +=
        "<div><b>You:</b> " + msg + "</div>";

    // Auto scroll after user message
    document.getElementById("chatbox").scrollTop =
        document.getElementById("chatbox").scrollHeight;

    fetch("/chatbot", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {

        // Show bot reply
        document.getElementById("chatbox").innerHTML +=
            "<div><b>Bot:</b> " + data.reply + "</div>";

        // Auto scroll after bot reply
        document.getElementById("chatbox").scrollTop =
            document.getElementById("chatbox").scrollHeight;
    });

    document.getElementById("msg").value = "";
}
</script>
</body>
</html>
