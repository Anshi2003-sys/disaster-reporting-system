<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<style>
.btn .btn1{
    position: absolute;
    margin-top: -130px;
    margin-left: 1000px;
    width:80px;
    height:40px;
    border-radius: 40px;
    background-color: red;
    color:white;
    font-weight: bold;
    text-decoration: none;
}
.btn1 h6{
    margin-top: 10px;
}
</style>

<body>

<div class="container mt-5">

<h2 class="mb-4">Disaster Reports Dashboard</h2>

<a href="/admin_report" class="btn btn-danger">
Report Disaster (Admin)
</a>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>User</th>
<th>Disaster</th>
<th>Location</th>
<th>Description</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for r in reports %}

<tr>

<td>{{ r.report_id }}</td>
<td>{{ r.name }}</td>
<td>{{ r.disaster_name }}</td>
<td>{{ r.location }}</td>
<td>{{ r.description }}</td>

<td>
<a href="/delete/{{ r.report_id }}" class="btn btn-danger btn-sm">
Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
<div class="btn"><a href="/logout" class="btn1"><h6>Logout</h6></a></div>

</body>
</html>
