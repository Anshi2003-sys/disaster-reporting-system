<!DOCTYPE html>
<html>
<head>

<title>Mizoram Disaster Intelligence Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Bootstrap -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- Marker Cluster -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
#map{
    height:85vh;
    border-radius: 12px;
}

.legend {
    position:absolute;
    bottom:20px;
    left:20px;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    z-index:1000;
    font-size:14px;
}

.popup-box {
    font-size: 14px;
}
.popup-box img {
    width: 100%;
    border-radius: 8px;
    margin-top: 8px;
}
</style>

</head>

<body class="bg-light">

<h2 class="text-center mt-3 text-danger">
🚨 Mizoram Disaster Intelligence Map
</h2>

<!-- FILTER -->
<div class="text-center mb-2">
    <button onclick="filterMarkers('ALL')" class="btn btn-dark btn-sm">All</button>
    <button onclick="filterMarkers('HIGH')" class="btn btn-danger btn-sm">High</button>
    <button onclick="filterMarkers('MEDIUM')" class="btn btn-warning btn-sm">Medium</button>
    <button onclick="filterMarkers('LOW')" class="btn btn-success btn-sm">Low</button>
</div>

<div id="map" class="container"></div>

<!-- LEGEND -->
<div class="legend">
<b>Severity</b><br>
<span style="color:red;">●</span> High Risk<br>
<span style="color:orange;">●</span> Medium Risk<br>
<span style="color:green;">●</span> Low Risk
</div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

// INIT MAP
var map = L.map('map').setView([23.1645, 92.9376], 13);

// ✅ HIGH PRECISION MAP (Google-like)
L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

// BACKEND DATA
var reports = {{ reports | tojson }};

// CLUSTER
var markerCluster = L.markerClusterGroup();
var heatData = [];
var allMarkers = [];

// COLOR FUNCTION
function getColor(severity) {
    severity = (severity || "LOW").toUpperCase();

    return severity === 'HIGH' ? 'red' :
           severity === 'MEDIUM' ? 'orange' :
           'green';
}

// ADD REPORT MARKERS
reports.forEach(function(report){

    var lat = parseFloat(report.latitude);
    var lon = parseFloat(report.longitude);
    if (!lat || !lon) return;

    var severity = (report.severity || "LOW").toUpperCase();

    var marker = L.circleMarker([lat, lon], {
        color: getColor(severity),
        fillColor: getColor(severity),
        radius: 9,
        fillOpacity: 0.85
    });

    var popupContent = `
        <div class="popup-box">
        <h6 style="color:${getColor(severity)};">🚨 ${report.disaster_name}</h6>
        <b>📍 Location:</b> ${report.location}<br>
        <b>⚠ Severity:</b> <span style="color:${getColor(severity)};">${severity}</span><br>
        <b>👤 Reported by:</b> ${report.reported_by}<br>
        <b>📝 Description:</b><br>${report.description}
    `;

    if(report.image){
        popupContent += `<img src="/static/uploads/${report.image}">`;
    }

    popupContent += `</div>`;

    marker.bindPopup(popupContent);
    markerCluster.addLayer(marker);

    allMarkers.push({marker: marker, severity: severity});

    let intensity = severity === 'HIGH' ? 1 :
                    severity === 'MEDIUM' ? 0.6 : 0.3;

    heatData.push([lat, lon, intensity]);
});

map.addLayer(markerCluster);

// HEATMAP
var heatLayer = L.heatLayer(heatData, {
    radius: 25,
    blur: 15
}).addTo(map);

// FILTER
function filterMarkers(level) {
    markerCluster.clearLayers();
    allMarkers.forEach(obj => {
        if (level === "ALL" || obj.severity === level) {
            markerCluster.addLayer(obj.marker);
        }
    });
}

// ✅ LIVE LOCATION TRACKING
var userMarker, accuracyCircle;

function showLiveLocation(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    var accuracy = position.coords.accuracy;

    if (userMarker) map.removeLayer(userMarker);
    if (accuracyCircle) map.removeLayer(accuracyCircle);

    userMarker = L.marker([lat, lon]).addTo(map)
        .bindPopup("📍 You are here").openPopup();

    
    map.setView([lat, lon], 17);
}

// WATCH USER
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(showLiveLocation);
} else {
    alert("Geolocation not supported");
}

// ✅ HIGHLIGHT MZU ROAD (EDIT COORDS IF NEEDED)
var mzuRoad = [
    [23.1645, 92.9376],
    [23.1655, 92.9390],
    [23.1665, 92.9405]
];

L.polyline(mzuRoad, {
    color: 'blue',
    weight: 5
}).addTo(map).bindPopup("MZU Road");

</script>

</body>
</html>
