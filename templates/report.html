<!DOCTYPE html>
<html>

<head>

<title>Report Disaster</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4 text-danger">🚨 Report Disaster</h2>

<div class="card shadow p-4">

<form method="POST" enctype="multipart/form-data">

<!-- AUTO LOCATION -->
<label>📍 Location (Auto-detected)</label>
<input type="text" id="location" name="location" class="form-control" readonly required>

<br>

<!-- LATITUDE -->
<label>Latitude</label>
<input type="text" id="latitude" name="latitude" class="form-control" readonly>

<br>

<!-- LONGITUDE -->
<label>Longitude</label>
<input type="text" id="longitude" name="longitude" class="form-control" readonly>

<br>

<!-- DISASTER TYPE -->
<div class="mb-3">
<label class="form-label">Disaster Type</label>

<select name="disaster" class="form-control" required>
<option>Flood</option>
<option>Earthquake</option>
<option>Fire</option>
<option>Landslide</option>
<option>Cyclone</option>
</select>

</div>

<!-- DESCRIPTION -->
<div class="mb-3">
<label class="form-label">📝 Description</label>
<textarea name="description" id="description" class="form-control" rows="4"
placeholder="Describe damage, injuries, severity (e.g., heavy flooding, houses collapsed, fire spreading...)"></textarea>
</div>

<!-- IMAGE -->
<div class="mb-3">
<label class="form-label">📷 Upload Image</label>
<input type="file" name="image" class="form-control" accept="image/*">
</div>

<!-- 🔥 AUTO SEVERITY DISPLAY -->
<div class="mb-3">
<label class="form-label">⚠ Estimated Severity</label>
<input type="text" id="severity_display" class="form-control" readonly placeholder="Auto-calculated">
</div>

<!-- HIDDEN FIELD -->
<input type="hidden" name="severity" id="severity">

<button class="btn btn-danger w-100">Submit Report</button>

</form>
</div>
</div>

<!-- ================= AUTO LOCATION SCRIPT ================= -->

<script>
window.onload = function () {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(success, error);
    }
};

function success(position) {

    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lon;

    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
        .then(res => res.json())
        .then(data => {

            let address = data.address;

            let place =
                (address.suburb || address.village || "") + ", " +
                (address.county || address.city_district || "") + ", " +
                (address.state || "");

            place = place.replace(/^,|,$/g, '').replace(/,,+/g, ',');

            document.getElementById("location").value = place;

        })
        .catch(() => {
            document.getElementById("location").value = "Location not found";
        });
}

function error() {
    alert("Please allow location access.");
}

</script>

<!-- ================= SEVERITY LOGIC ================= -->

<script>

// 🔥 SIMPLE AI-LIKE SEVERITY DETECTION
document.getElementById("description").addEventListener("input", function () {

    let text = this.value.toLowerCase();
    let severity = "LOW";

    if (
        text.includes("death") ||
        text.includes("collapsed") ||
        text.includes("severe") ||
        text.includes("destroyed") ||
        text.includes("fire spreading")
    ) {
        severity = "HIGH";
    }
    else if (
        text.includes("flood") ||
        text.includes("damage") ||
        text.includes("injury") ||
        text.includes("landslide")
    ) {
        severity = "MEDIUM";
    }

    document.getElementById("severity").value = severity;
    document.getElementById("severity_display").value = severity;
});
</script>

</body>
</html>
